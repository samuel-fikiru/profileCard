<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="product-card-container">
      <div class="image-container">
        <img class="profile-image" src="images/girl.png" alt="" />
      </div>

      <div class="profile-info-container">
        <div class="profile-name-container">
          <p class="profile-name">Sophie Bennett</p>
          <img
            class="checkmark-image"
            src="images/icons/black-checkmark.png"
            alt=""
          />
        </div>
        <div class="profile-bio-container">
          <p class="profile-bio">Product Designer who focuses on simplicity & usability.</p>
        </div>
        <div class="profile-stat-continer">
          <div class="profile-stat">
            <img class="icons" src="images/icons/man.png" alt="">
            <p class="count-numbers">312</p>
          </div>
          <div class="profile-stat">
            <img class="gallary-icon" src="images/icons/gallary.png" alt="">
            <p class="count-numbers">48</p>
          </div>
          <button class="profile-stat follow-button">
            Follow
            <img class="plus-icon" src="images/icons/plus.png" alt="">
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
