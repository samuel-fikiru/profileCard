<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="product-card-container">
      <div class="image-container">
        <img class="profile-image" src="images/girl.png" alt="" />
      </div>

      <div class="profile-info-container">
        <div class="profile-name-container">
          <p class="profile-name">Sophie Bennett</p>
          <img
            class="checkmark-image"
            src="images/icons/blue-checkmark.png"
            alt=""
          />
        </div>
        <div class="profile-bio-container">
          <p class="profile-bio">Product Designer who focuses on simplicity & usability.</p>
        </div>
        <div class="profile-stat-continer">
          <div class="profile-stat">
            <img class="man-icon" src="images/icons/man.png" alt="">
            <p class="follower-count">312</p>
          </div>
          <div class="profile-stat">
            <img class="gallary-icon" src="images/icons/gallary.png" alt="">
            <p class="gallary-count">48</p>
          </div>
          <button class="profile-stat follow-button js-folllow-button">
            Follow
            <img class="plus-icon" src="images/icons/plus.png" alt="">
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
